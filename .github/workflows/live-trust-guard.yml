name: live-trust-guard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live trust guard
        run: |
          python live_trust_guard.py \
            --base-url https://www.statelicensingreference.com \
            --sample-size 25 \
            --json-report artifacts/live_trust_guard_report.json

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-trust-guard-report
          path: artifacts/live_trust_guard_report.json
